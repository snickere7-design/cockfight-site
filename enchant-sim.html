<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>點裝模擬器</title>
<style>
/* 0715改版:整個UI變成「一個道具欄視窗」,照董事長丟的原版遊戲截圖(ref-inventory.png)仿製——
   深色石質/金屬邊框+黑格道具欄矩陣,不再是紫色科技風。 */
:root{--bg:#100e0c;--panel:#26221c;--line:#4a4436;--ink:#e8e2d5;--sub:#9c9484;--gold:#d4af6a;--goldbright:#f0cf8a;--blue:#5aa0ff;--red:#ff5a5a;--green:#6fdd8b;--grey:#9c9484}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:radial-gradient(ellipse at 50% -20%,#2a241a 0%,var(--bg) 55%);color:var(--ink);font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 12px 40px}
h1{font-size:1.1rem;letter-spacing:.25em;margin:6px 0 2px;color:var(--gold);text-shadow:0 0 10px rgba(212,175,106,.35)}
.sub{font-size:.7rem;color:var(--sub);margin-bottom:4px;text-align:center}
#nightHint{display:none;font-size:.72rem;color:var(--gold);margin-bottom:10px;text-align:center}

/* ===== 道具欄視窗本體 ===== */
.invwrap{display:flex;gap:6px;align-items:stretch;width:100%;max-width:380px}
.invwindow{flex:1;background:#3a3a3e;border-radius:4px;padding:9px;
  border:8px solid #6b5324;
  border-image:repeating-linear-gradient(45deg,#e8c988 0 3px,#8a6a2a 3px 6px,#5a4318 6px 8px) 8;
  box-shadow:inset 0 0 0 2px #0a0a0a,0 8px 24px rgba(0,0,0,.65)}
.invgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:#0a0a0a;padding:2px;border:1px solid #1c1a16}
.cell{position:relative;aspect-ratio:1;background:#151412;border:1px solid #38352c;display:flex;align-items:center;justify-content:center;overflow:hidden}
.cell.empty{cursor:default}
.cell.scrollcell,.cell.equipcell{cursor:pointer}
.cell img{width:76%;height:76%;object-fit:contain;pointer-events:none}
.cell svg{pointer-events:none}
.ifallback{width:70%;height:70%;background:#241d18;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--sub)}
.cellCount{position:absolute;bottom:1px;right:2px;font-size:.58rem;color:#fff;text-shadow:0 0 2px #000,0 0 2px #000;font-weight:700}
.lvBadge{position:absolute;bottom:1px;right:2px;font-size:.6rem;color:#fff;text-shadow:0 0 2px #000,0 0 2px #000;font-weight:700}
.lockBadge{position:absolute;top:1px;left:2px;font-size:.6rem}
.cellFlash{position:absolute;inset:0;pointer-events:none;opacity:0}
.cellFlash.ok{background:radial-gradient(circle,rgba(120,180,255,.95),transparent 70%);animation:pop .7s}
.cellFlash.crit{background:radial-gradient(circle,rgba(255,220,120,.95),transparent 70%);animation:pop .9s}
.cellFlash.bad{background:radial-gradient(circle,rgba(255,90,90,.9),transparent 70%);animation:pop .8s}
.cellFlash.keep{background:radial-gradient(circle,rgba(160,160,175,.85),transparent 70%);animation:pop .8s}
@keyframes pop{0%{opacity:0}25%{opacity:1}100%{opacity:0}}
.cell.shake{animation:shake .5s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.cell.channelFlip{animation:flip .7s}
@keyframes flip{0%{filter:none}30%{filter:hue-rotate(160deg) brightness(1.3)}70%{filter:hue-rotate(300deg)}100%{filter:none}}
.cell.armed{box-shadow:inset 0 0 0 2px var(--goldbright);animation:cellPulse 1s infinite;z-index:1}
.cell.targetable{box-shadow:inset 0 0 0 2px var(--goldbright);animation:cellPulse 1.1s infinite;z-index:1}
@keyframes cellPulse{0%,100%{box-shadow:inset 0 0 0 2px rgba(240,207,138,.5)}50%{box-shadow:inset 0 0 0 2px rgba(240,207,138,1),0 0 10px rgba(240,207,138,.7)}}
.cell.locked{box-shadow:inset 0 0 0 2px #8a2a2a}

/* 名稱浮標(仿截圖「+7 保護者斗篷」白字樣式) */
#msg{min-height:1.7em;text-align:center;font-size:.92rem;font-weight:700;margin:8px 2px 6px;padding:2px 4px;color:#fff;text-shadow:0 1px 2px #000,0 0 6px rgba(0,0,0,.8)}
#msg.label{color:#fff}
#msg.ok{color:var(--blue)}#msg.crit{color:var(--goldbright)}#msg.bad{color:var(--red)}#msg.info{color:var(--sub);font-weight:400;text-shadow:none}#msg.keep{color:var(--grey)}

/* 底部工具列(P/垃圾桶/%/鎖) */
.toolbar{display:flex;gap:6px;margin-top:8px;justify-content:center}
.toolbtn{flex:1;max-width:58px;aspect-ratio:1;background:linear-gradient(180deg,#4a4a4e,#2c2c30);border:1px solid #1c1a16;border-radius:6px;color:var(--sub);font-size:1.05rem;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
.toolbtn:active{transform:scale(.93)}
.toolbtn.active{color:var(--goldbright);border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold),0 0 8px rgba(212,175,106,.5)}

/* 右側裝飾捲軸條(純裝飾,仿截圖右側金屬杆) */
.sidebar{width:16px;background:linear-gradient(90deg,#2a2a2e,#1a1a1c);border-radius:3px;position:relative;flex:none}
.sidebar::before{content:'';position:absolute;left:50%;top:6%;bottom:10%;width:5px;transform:translateX(-50%);background:linear-gradient(180deg,#e8c988,#8a6a2a,#e8c988,#8a6a2a);border-radius:3px}
.sidebar::after{content:'';position:absolute;left:50%;bottom:4%;width:11px;height:11px;transform:translateX(-50%);background:radial-gradient(circle at 35% 35%,#5a5a5e,#141416);border-radius:50%;border:1px solid #0a0a0a}

/* 統計移到視窗外,縮小 */
.metarow{font-size:.68rem;color:var(--sub);text-align:center;margin:10px 0 4px;line-height:1.7}
.metarow b{color:var(--gold)}

/* 次要按鈕 */
.btnrow2{display:flex;gap:8px;width:100%;max-width:380px;margin-top:6px}
button.ghost2{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:9px 6px;font-size:.82rem;font-family:inherit;cursor:pointer}
button.ghost2:active{transform:scale(.96)}

/* 摺疊區塊(記錄/設定) */
.card{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:10px}
details summary{cursor:pointer;color:var(--sub);font-size:.8rem;margin-bottom:6px}
#log{max-height:160px;overflow-y:auto;font-size:.78rem;line-height:1.85}
#log .ok{color:var(--blue)}#log .crit{color:var(--goldbright)}#log .bad{color:var(--red)}#log .born{color:var(--green)}#log .keep{color:var(--grey)}
button#btnReport{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:9px;font-size:.82rem;font-family:inherit;cursor:pointer}

/* ===== 彈窗(裝備圖鑑P / 蒸發墓園) ===== */
.modalOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:20;align-items:flex-end;justify-content:center}
.modalOverlay.open{display:flex}
.modalPanel{width:100%;max-width:420px;max-height:82vh;background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--gold);border-radius:14px 14px 0 0;padding:14px;overflow-y:auto}
.modalHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-weight:700;color:var(--gold)}
.modalHead button{background:none;border:none;color:var(--sub);font-size:1.1rem;cursor:pointer}
.kindTabs{display:flex;gap:8px;margin-bottom:8px}
.kindTab{flex:1;padding:9px;border-radius:8px;background:#1a1712;border:1px solid var(--line);color:var(--sub);font-size:.85rem;font-family:inherit;cursor:pointer}
.kindTab.active{background:linear-gradient(180deg,#5a4a2a,#3a2f1a);color:var(--ink);border-color:var(--gold);font-weight:700}
.typeChips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chip{padding:5px 10px;border-radius:14px;background:#1a1712;border:1px solid var(--line);color:var(--sub);font-size:.72rem;flex:none;font-family:inherit;cursor:pointer}
.chip.active{background:#4a3f28;color:var(--ink);border-color:var(--gold)}
.itemGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pickitem{background:#1a1712;border:1px solid var(--line);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer}
.pickitem:active{transform:scale(.95)}
.pickitem.sel{border-color:var(--gold)}
.pickitem img{width:40px;height:40px;object-fit:contain;display:block;margin:0 auto}
.pickitem .ifallback{width:40px;height:40px}
.pname{font-size:.68rem;margin-top:4px;line-height:1.2;height:2.3em;overflow:hidden}
.psafe{font-size:.6rem;color:var(--sub)}
#grave{font-size:.8rem;color:var(--sub);line-height:1.9}
</style></head><body>
<h1>⚔ 點裝模擬器</h1>
<div class="sub">官方機率原始移植・過安定後有成功/維持/蒸發三種結果|純懷舊自娛,與任何遊戲公司無關</div>
<div id="nightHint"></div>

<div class="invwrap">
  <div class="invwindow" id="invwindow">
    <div class="invgrid" id="invgrid">
      <div class="cell scrollcell" data-slot="white" id="cellWhite">

          <rect x="4" y="6" width="8" height="1" fill="#a89660"/><rect x="4" y="9" width="8" height="1" fill="#a89660"/><rect x="4" y="12" width="8" height="1" fill="#a89660"/>

          <rect x="4" y="6" width="8" height="1" fill="#b8860b"/><rect x="4" y="9" width="8" height="1" fill="#b8860b"/><rect x="12" y="3" width="2" height="2" fill="#fff3c4"/>
        </svg>

      </div>
      <div class="cell scrollcell" data-slot="curse" id="cellCurse">

          <rect x="5" y="7" width="2" height="2" fill="#ff5a5a"/><rect x="9" y="7" width="2" height="2" fill="#ff5a5a"/><rect x="5" y="11" width="6" height="1" fill="#ff5a5a"/>
        </svg>
        <span class="cellCount"><span id="cntCurse">0</span></span>
      </div>
      <div class="cell equipcell empty" data-slot="equip" id="cellEquip">
        <div class="cellFlash" id="equipFlash"></div>

        <span class="lockBadge" id="equipLockBadge"></span>
      </div>
      <!-- 其餘空格(仿原版滿版道具欄的視覺份量,非互動) -->
      <div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div>
      <div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div>
      <div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div>
      <div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div>
    </div>
    <div id="msg" class="info">點右下角「P」挑一件裝備</div>
    <div class="toolbar">
      <button class="toolbtn" id="tbPick" title="裝備圖鑑">P</button>
      <button class="toolbtn" id="tbGrave" title="蒸發墓園">🗑</button>
      <button class="toolbtn" id="tbPct" title="機率顯示">%</button>
      <button class="toolbtn" id="tbLock" title="鎖定裝備">🔒</button>
    </div>
  </div>
  <div class="sidebar"></div>
</div>

<div class="metarow">白卷消耗 <b id="sWhite">0</b>・祝福卷消耗 <b id="sBless">0</b>・蒸發 <b id="sDead">0</b> 件・歷史最高 <b id="sBest">+0</b></div>

<div class="btnrow2">
  <button class="ghost2" id="btnChannel">🔄 換頻道</button>
  <button class="ghost2" id="btnAgain">再拿一件(同款)</button>
</div>

<div class="card">
  <details><summary>衝裝記錄</summary><div id="log"></div></details>
</div>

<div class="card">
  <details><summary>⚙ 設定</summary>
    <button id="btnReport">🚩 這件裝備的名字翻譯怪怪的,回報一下</button>
    <div id="reportList" style="font-size:.7rem;color:var(--sub);margin-top:8px;line-height:1.6">尚未回報任何譯名問題。</div>
  </details>
</div>

<!-- 裝備圖鑑彈窗 -->
<div class="modalOverlay" id="pickerModal">
  <div class="modalPanel">
    <div class="modalHead"><span>選擇裝備</span><button id="pickerClose">✕</button></div>
    <div class="kindTabs">
      <button class="kindTab active" data-kind="w">⚔ 武器</button>
      <button class="kindTab" data-kind="a">🛡 防具</button>
    </div>
    <div class="typeChips" id="typeChips"></div>
    <div class="itemGrid" id="itemGrid"></div>
  </div>
</div>

<!-- 蒸發墓園彈窗 -->
<div class="modalOverlay" id="graveModal">
  <div class="modalPanel">
    <div class="modalHead"><span>🪦 蒸發墓園</span><button id="graveClose">✕</button></div>
    <div id="grave">還沒有犧牲者。</div>
  </div>
</div>

function tier(lv,safe){const over=lv-safe;if(over>=6)return 't4';if(over>=3)return 't3';if(over>=1)return 't2';return 't1';}

// 查表算「目前這階用這種卷軸」的官方總成功率(供%顯示與擲骰共用同一份資料,確保顯示的數字=實際擲骰用的數字)
function lookup(scrollType){
  if(!it)return null;
  const t=PROB[it.cat]&&PROB[it.cat][scrollType];
  if(!t)return null;
  return t[it.lv]||null;
}
function successRate(scrollType){
  const outs=lookup(scrollType);
  if(!outs)return null;
  return outs.filter(o=>o[0]==='ok').reduce((s,o)=>s+o[2],0);
}
function fmtRate(rate){return rate===null?'不適用':(rate>=99.99?'必成':(Math.round(rate*100)/100)+'%成功');}

function msg(t,c){const m=$('msg');m.textContent=t;m.className=c;}
function log(html,cls){const d=document.createElement('div');d.className=cls||'';d.innerHTML=html;$('log').prepend(d);}
function renderGrave(){const g=Object.entries(S.graves).map(([k,v])=>'🪦 '+k+' ×'+v).join('<br>');$('grave').innerHTML=g||'還沒有犧牲者。';}

// ===== 主渲染:只更新既有DOM節點的內容/class,絕不整片innerHTML重建道具格(避免打斷施法演出動畫) =====
function render(){
  $('sWhite').textContent=S.white;$('sBless').textContent=S.bless;$('sDead').textContent=S.dead;$('sBest').textContent='+'+S.best;
  $('cntWhite').textContent=S.white;$('cntBless').textContent=S.bless;$('cntCurse').textContent=S.curse;
  renderEquipCell();
  $('btnAgain').disabled=!lastDef;
}
function renderEquipCell(){
  const cell=$('cellEquip'),inner=$('equipInner');
  if(!it){
    inner.innerHTML='';$('equipLvBadge').textContent='';$('equipLockBadge').textContent='';
    cell.classList.add('empty');cell.classList.remove('locked');
    return;
  }
  cell.classList.remove('empty');
  const img=it.icon?('<img src="lineage-icons/'+it.icon+'.png" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'):'';
  const fb='<div class="ifallback" style="'+(it.icon?'display:none':'display:flex')+'">'+it.n[0]+'</div>';
  inner.innerHTML=img+fb;
  $('equipLvBadge').textContent='+'+it.lv;
  $('equipLockBadge').textContent=it.locked?'🔒':'';
  cell.classList.toggle('locked',!!it.locked);
}

// 武裝/取消武裝一個卷軸格:天堂原版「先點卷軸再點裝備」的施用手感
function setArmed(scrollType){
  armed=scrollType;pctPeek=false;renderToolbar();
  ['cellWhite','cellBless','cellCurse'].forEach(id=>$(id).classList.toggle('armed',$(id).dataset.slot===scrollType));
  $('cellEquip').classList.toggle('targetable',!!armed);
  if(!armed){msg(it?'點一個卷軸,再點裝備格施用':'點右下角「P」挑一件裝備','info');return;}
  if(!it){msg('先選一件裝備','info');return;}
  const rate=successRate(armed);
  msg('已選'+SCROLL_LABEL[armed]+'!點裝備來施用('+fmtRate(rate)+')','info');
}
function renderToolbar(){
  $('tbPct').classList.toggle('active',pctPeek);
}

function selectItem(def){
  it={id:def.id,n:def.n,kind:def.kind,type:def.type,typeLabel:def.typeLabel,cat:def.cat,safe:def.safe,icon:def.icon,lv:0,locked:false};
  lastDef=def;
  msg('拿到了 '+it.n+'。衝吧。','label');
  log('🆕 拿到 '+it.n+'(安定+'+it.safe+', '+KIND_LABEL[it.kind]+'/'+it.typeLabel+')','born');
  document.querySelectorAll('.pickitem').forEach(el=>el.classList.toggle('sel',+el.dataset.id===def.id));
  render();
}

// ===== 核心:照官方表擲骰,三種結果——演出全部發生在道具欄的裝備格上 =====
// 流程=點卷軸格(武裝)→點裝備格(這裡)→跳官方成功率確認一拍(550ms)→開卷心跳(900ms)→格子閃光/碎裂結果
function enchant(scrollType){
  if(!it||busy)return;
  const outs=lookup(scrollType);
  if(!outs){msg(SCROLL_LABEL[scrollType]+' 對目前這階不適用','info');return;}
  busy=true;
  const rate=successRate(scrollType);
  msg('確認機率:'+SCROLL_LABEL[scrollType]+'・目前 '+fmtRate(rate)+'……','info');
  setTimeout(()=>{
    S[scrollType]++;
    render();
    const opening={white:'卷軸捲了起來……',bless:'祝福的卷軸在發光……',curse:'詛咒的低語傳來……'};
    msg(opening[scrollType],'info');
    setTimeout(()=>{
      const roll=Math.random()*100;
      let acc=0,chosen=outs[outs.length-1];
      for(const o of outs){acc+=o[2];if(roll<acc){chosen=o;break;}}
      const cell=$('cellEquip'),fl=$('equipFlash');
      fl.className='cellFlash';void fl.offsetWidth;
      const [type,toLv]=chosen;
      if(type==='ok'){
        const jump=toLv-it.lv;
        it.lv=toLv;
        if(it.lv>S.best)S.best=it.lv;
        if(scrollType==='curse'){
          fl.className='cellFlash ok';msg(it.n+' 被詛咒侵蝕 → +'+it.lv,'ok');
          log('⚫ '+it.n+' 詛咒 → <b>+'+it.lv+'</b>','ok');
        }else if(jump>=2){
          fl.className='cellFlash crit';msg('聖光爆發!! 連跳'+jump+'級 → +'+it.lv+' '+it.n,'crit');
          log('✨ '+it.n+' 連跳 → <b>+'+it.lv+'</b>','crit');
        }else{
          const over=it.lv>it.safe;
          fl.className='cellFlash '+(over?'crit':'ok');
          msg((over?'耀眼金光!! ':'')+'+'+it.lv+' '+it.n,over?'crit':'ok');
          log((over?'🌟':'🔵')+' '+it.n+' → <b>+'+it.lv+'</b>'+(over?'(過安定!)':''),over?'crit':'ok');
        }
      }else if(type==='keep'){
        fl.className='cellFlash keep';
        msg('卷軸化為粉末…… '+it.n+' 安然無恙(仍是 +'+it.lv+')','keep');
        log('💨 '+it.n+' 卷軸耗損,裝備無事(+'+it.lv+')','keep');
      }else{
        S.dead++;cell.classList.add('shake');fl.className='cellFlash bad';
        msg('碎裂——+'+it.lv+' '+it.n+' 蒸發了。','bad');
        log('💥 +'+it.lv+' '+it.n+' <b>蒸發</b>','bad');
        const k='+'+it.lv+' '+it.n;S.graves[k]=(S.graves[k]||0)+1;
        renderGrave();
        it=null;
        setTimeout(()=>cell.classList.remove('shake'),600);
      }
      saveS();render();
      busy=false;
    },900);
  },550);
}

// 裝備圖鑑%機率顯示模式:點了%再點裝備,一次列出白/祝福/詛咒三種卷軸目前成功率(還原遊戲內%查詢功能)
function doPeek(){
  if(!it){msg('先選一件裝備','info');return;}
  const parts=['white','bless','curse'].map(st=>SCROLL_LABEL[st]+' '+fmtRate(successRate(st))).join('  ');
  msg('+'+it.lv+' '+it.n+' → '+parts,'info');
}

// ===== 道具欄格子點擊(事件委派) =====
$('invgrid').addEventListener('click',e=>{
  const cell=e.target.closest('.cell');if(!cell)return;
  const slot=cell.dataset.slot;
  if(slot==='white'||slot==='bless'||slot==='curse'){
    if(busy)return;
    setArmed(armed===slot?null:slot);
    return;
  }
  if(slot==='equip'){
    if(busy)return;
    if(!it){msg('先點右下角「P」挑一件裝備','info');return;}
    if(pctPeek){doPeek();pctPeek=false;renderToolbar();return;}
    if(armed){
      if(it.locked){setArmed(null);msg('🔒 裝備已鎖定,先點鎖頭解鎖再衝','info');return;}
      const st=armed;setArmed(null);enchant(st);return;
    }
    msg('+'+it.lv+' '+it.n,'label');
  }
});
// 武裝中點空白處(道具欄以外/工具列/次要按鈕)=取消施用
document.addEventListener('click',(e)=>{
  if(!armed)return;
  if(e.target.closest('.cell'))return; // 交給上面 invgrid 自己的委派處理
  setArmed(null);
},true);

// 底部工具列
$('tbPick').onclick=()=>{$('pickerModal').classList.add('open');};
$('pickerClose').onclick=()=>{$('pickerModal').classList.remove('open');};
$('tbGrave').onclick=()=>{renderGrave();$('graveModal').classList.add('open');};
$('graveClose').onclick=()=>{$('graveModal').classList.remove('open');};
$('tbPct').onclick=()=>{if(busy)return;setArmed(null);pctPeek=!pctPeek;renderToolbar();msg(pctPeek?'機率顯示模式:點裝備格看目前成功率':'已取消機率顯示','info');};
$('tbLock').onclick=()=>{if(!it){msg('先選一件裝備','info');return;}it.locked=!it.locked;render();msg(it.locked?'🔒 已鎖定目前裝備(防誤點,機率不變)':'🔓 已解鎖','info');};
document.querySelectorAll('.modalOverlay').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');});});

$('btnAgain').onclick=()=>{if(lastDef&&!busy)selectItem(lastDef);};
// 彩蛋①換頻道:純視覺,機率完全不變
$('btnChannel').onclick=()=>{
  if(busy)return;
  const cell=$('cellEquip');
  cell.classList.add('channelFlip');
  msg('正在換頻道……手氣重新整理中','info');
  setTimeout(()=>{
    cell.classList.remove('channelFlip');
    msg(it?'頻道換好了,感覺手氣變好了(其實機率沒變)':'點右下角「P」挑一件裝備','info');
  },700);
};

// 彩蛋②深夜加成曖昧提示:純文字,機率完全不變
(function(){
  const h=new Date().getHours();
  if(h>=0&&h<5){$('nightHint').textContent='🌙 深夜衝裝…加成?(傳說,機率沒有變,別太迷信)';$('nightHint').style.display='block';}
})();

// 譯名回報:先不擋上線,記到 localStorage 供之後匯出校對
function renderReports(){$('reportList').textContent=S.reports.length?'已回報:'+S.reports.join('、'):'尚未回報任何譯名問題。';}
$('btnReport').onclick=()=>{
  if(!it){msg('先選一件裝備','info');return;}
  if(!S.reports.includes(it.n)){S.reports.push(it.n);saveS();}
  renderReports();
  msg('已記錄「'+it.n+'」,謝謝回報!','info');
};

// ===== 裝備圖鑑(P彈窗) =====
function itemCardHtml(x){
  const img=x.icon?'<img src="lineage-icons/'+x.icon+'.png" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">':'';
  const fb='<div class="ifallback" style="'+(x.icon?'display:none':'display:flex')+'">'+x.n[0]+'</div>';
  return '<div class="pickitem'+(it&&it.id===x.id?' sel':'')+'" data-id="'+x.id+'">'+img+fb+'<div class="pname">'+x.n+'</div><div class="psafe">安定+'+x.safe+'</div></div>';
}
function renderPicker(){
  const kindItems=ITEMS.filter(x=>x.kind===pickerKind);
  const order=pickerKind==='w'?W_TYPE_ORDER:A_TYPE_ORDER;
  const types=order.filter(t=>kindItems.some(x=>x.type===t));
  let chips='<button class="chip'+(pickerType===null?' active':'')+'" data-type="">全部('+kindItems.length+')</button>';
  for(const t of types){
    const inCat=kindItems.filter(x=>x.type===t);
    chips+='<button class="chip'+(pickerType===t?' active':'')+'" data-type="'+t+'">'+inCat[0].typeLabel+'('+inCat.length+')</button>';
  }
  $('typeChips').innerHTML=chips;
  const shown=pickerType?kindItems.filter(x=>x.type===pickerType):kindItems;
  $('itemGrid').innerHTML=shown.map(itemCardHtml).join('');
}
document.querySelectorAll('.kindTab').forEach(b=>b.onclick=()=>{
  pickerKind=b.dataset.kind;pickerType=null;
  document.querySelectorAll('.kindTab').forEach(x=>x.classList.toggle('active',x===b));
  renderPicker();
});
$('typeChips').addEventListener('click',e=>{
  const b=e.target.closest('.chip');if(!b)return;
  pickerType=b.dataset.type||null;
  renderPicker();
});
$('itemGrid').addEventListener('click',e=>{
  const c=e.target.closest('.pickitem');if(!c)return;
  const def=ITEMS.find(x=>x.id===+c.dataset.id);
  if(def){selectItem(def);$('pickerModal').classList.remove('open');}
});

// ===== 初始化 =====
renderReports();
renderGrave();
renderPicker();
renderToolbar();
const defaultDef=ITEMS.find(x=>x.id===2); // 武士刀,平民神器,當第一次進來的預設裝備
if(defaultDef)selectItem(defaultDef);
render();
</script></body></html>
