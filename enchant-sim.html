<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>點裝模擬器</title>
<style>
:root{--bg:#0d0b14;--panel:#1a1626;--line:#332b4d;--ink:#e8e2f5;--sub:#9a8fc0;--gold:#f5c542;--blue:#5aa0ff;--red:#ff5a5a;--green:#6fdd8b;--grey:#9a9aa8}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:radial-gradient(ellipse at 50% -10%,#241d3a 0%,var(--bg) 60%);color:var(--ink);font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 12px 40px}
h1{font-size:1.15rem;letter-spacing:.25em;margin:6px 0 2px;color:var(--gold);text-shadow:0 0 12px rgba(245,197,66,.35)}
.sub{font-size:.72rem;color:var(--sub);margin-bottom:4px;text-align:center}
#nightHint{display:none;font-size:.72rem;color:#c9a8ff;margin-bottom:10px;text-align:center}
.card{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
/* 裝備區 */
#itemBox{text-align:center;padding:22px 14px;position:relative;overflow:hidden}
#itemName{font-size:1.5rem;font-weight:700;letter-spacing:.06em;transition:.2s}
#itemName.t1{color:#cfd6e4}
#itemName.t2{color:var(--blue);text-shadow:0 0 14px rgba(90,160,255,.6)}
#itemName.t3{color:var(--gold);text-shadow:0 0 18px rgba(245,197,66,.75)}
#itemName.t4{color:#ff9df5;text-shadow:0 0 22px rgba(255,157,245,.85)}
#itemMeta{font-size:.78rem;color:var(--sub);margin-top:6px}
#itemBox.shake{animation:shake .5s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
#itemBox.channelFlip{animation:flip .7s}
@keyframes flip{0%{filter:none}30%{filter:hue-rotate(180deg) brightness(1.3)}70%{filter:hue-rotate(320deg)}100%{filter:none}}
#flash{position:absolute;inset:0;pointer-events:none;opacity:0;border-radius:14px}
#flash.ok{background:radial-gradient(circle,rgba(120,180,255,.95),transparent 70%);animation:pop .7s}
#flash.crit{background:radial-gradient(circle,rgba(255,220,120,.95),transparent 70%);animation:pop .9s}
#flash.bad{background:radial-gradient(circle,rgba(255,90,90,.9),transparent 70%);animation:pop .8s}
#flash.keep{background:radial-gradient(circle,rgba(160,160,175,.85),transparent 70%);animation:pop .8s}
@keyframes pop{0%{opacity:0}25%{opacity:1}100%{opacity:0}}
/* 按鈕 */
.btnrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
button{flex:1;min-width:96px;background:#241d3a;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px 6px;font-size:.92rem;font-family:inherit;cursor:pointer;transition:.15s}
button:active{transform:scale(.96)}
button.ghost{background:#141021}
button:disabled{opacity:.35;pointer-events:none}
/* 卷軸道具格(點卷軸→點裝備 的施用儀式) */
.slotrow{display:flex;gap:10px;justify-content:center;margin-bottom:10px}
.slot{flex:1;max-width:120px;background:#141021;border:2px solid var(--line);border-radius:12px;padding:8px 4px 6px;text-align:center;cursor:pointer;transition:.15s;user-select:none}
.slot:active{transform:scale(.95)}
.slot svg{display:block;margin:0 auto}
.slotLabel{font-size:.78rem;font-weight:700;margin-top:2px}
.slotCount{font-size:.62rem;color:var(--sub);margin-top:1px}
.slot.armed{border-color:var(--gold);animation:slotPulse 1s infinite}
@keyframes slotPulse{0%,100%{box-shadow:0 0 8px rgba(245,197,66,.4)}50%{box-shadow:0 0 20px rgba(245,197,66,.85)}}
#itemBox.targetable{border-color:var(--gold);cursor:pointer;animation:boxPulse 1.1s infinite}
@keyframes boxPulse{0%,100%{box-shadow:0 0 10px rgba(245,197,66,.35)}50%{box-shadow:0 0 24px rgba(245,197,66,.75)}}
/* 訊息 */
#msg{min-height:1.6em;text-align:center;font-size:1rem;font-weight:700;margin:4px 0 8px}
#msg.ok{color:var(--blue)}#msg.crit{color:var(--gold)}#msg.bad{color:var(--red)}#msg.info{color:var(--sub);font-weight:400}#msg.keep{color:var(--grey)}
/* 統計 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center;font-variant-numeric:tabular-nums}
.stats b{display:block;font-size:1.15rem}
.stats span{font-size:.68rem;color:var(--sub)}
/* 裝備選擇器 */
.kindTabs{display:flex;gap:8px;margin-bottom:8px}
.kindTab{flex:1;padding:9px;border-radius:8px;background:#141021;border:1px solid var(--line);color:var(--sub);font-size:.85rem}
.kindTab.active{background:linear-gradient(180deg,#3a2f63,#241d3a);color:var(--ink);border-color:#5a4a99;font-weight:700}
.typeChips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chip{padding:5px 10px;border-radius:14px;background:#141021;border:1px solid var(--line);color:var(--sub);font-size:.72rem;flex:none;min-width:0}
.chip.active{background:#332b4d;color:var(--ink);border-color:#5a4a99}
.itemGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-height:340px;overflow-y:auto;padding-right:2px}
.pickitem{background:#141021;border:1px solid var(--line);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer}
.pickitem:active{transform:scale(.95)}
.pickitem.sel{border-color:var(--gold)}
.pickitem img{width:40px;height:40px;object-fit:contain;display:block;margin:0 auto}
.ifallback{width:40px;height:40px;margin:0 auto;background:#241d3a;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;color:var(--sub)}
.pname{font-size:.68rem;margin-top:4px;line-height:1.2;height:2.3em;overflow:hidden}
.psafe{font-size:.6rem;color:var(--sub)}
/* 選裝(舊區塊沿用之樣式，記錄/墓園) */
select,input[type=number],input[type=text]{background:#141021;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:9px;font-size:.9rem;font-family:inherit;width:100%}
.row{display:flex;gap:8px;margin-top:8px}
.row>*{flex:1}
label{font-size:.72rem;color:var(--sub)}
/* 記錄 */
#log{max-height:180px;overflow-y:auto;font-size:.8rem;line-height:1.9}
#log .ok{color:var(--blue)}#log .crit{color:var(--gold)}#log .bad{color:var(--red)}#log .born{color:var(--green)}#log .keep{color:var(--grey)}
#grave{font-size:.78rem;color:var(--sub);line-height:1.8}
details summary{cursor:pointer;color:var(--sub);font-size:.82rem;margin-bottom:6px}
.best{color:var(--gold);font-weight:700}
</style></head><body>
<h1>⚔ 點裝模擬器</h1>
<div class="sub">官方機率原始移植・過安定後有成功/維持/蒸發三種結果|純懷舊自娛,與任何遊戲公司無關</div>
<div id="nightHint"></div>

<div class="card" id="itemBox">
  <div id="flash"></div>
  <div id="itemName" class="t1">—</div>
  <div id="itemMeta"></div>
</div>

<div id="msg" class="info">從下面「裝備選擇」挑一件開始</div>

<div class="card">
  <!-- 卷軸道具格:天堂原版玩法=先點卷軸(格子亮起)→再點裝備卡施用,不是選好裝備按按鈕 -->
  <div class="slotrow">
    <div class="slot" data-scroll="white" id="slotWhite">
      <svg width="30" height="36" viewBox="0 0 16 20" shape-rendering="crispEdges">
        <rect x="2" y="2" width="12" height="16" fill="#e8ddb5"/><rect x="1" y="1" width="14" height="2" fill="#c9b880"/><rect x="1" y="17" width="14" height="2" fill="#c9b880"/>
        <rect x="4" y="6" width="8" height="1" fill="#a89660"/><rect x="4" y="9" width="8" height="1" fill="#a89660"/><rect x="4" y="12" width="8" height="1" fill="#a89660"/>
      </svg>
      <div class="slotLabel">白卷</div><div class="slotCount"><span id="cntWhite">0</span> 已用</div>
    </div>
    <div class="slot" data-scroll="bless" id="slotBless">
      <svg width="30" height="36" viewBox="0 0 16 20" shape-rendering="crispEdges">
        <rect x="2" y="2" width="12" height="16" fill="#f5d97a"/><rect x="1" y="1" width="14" height="2" fill="#d4a92e"/><rect x="1" y="17" width="14" height="2" fill="#d4a92e"/>
        <rect x="4" y="6" width="8" height="1" fill="#b8860b"/><rect x="4" y="9" width="8" height="1" fill="#b8860b"/><rect x="12" y="3" width="2" height="2" fill="#fff3c4"/>
      </svg>
      <div class="slotLabel">祝福卷</div><div class="slotCount"><span id="cntBless">0</span> 已用</div>
    </div>
    <div class="slot" data-scroll="curse" id="slotCurse">
      <svg width="30" height="36" viewBox="0 0 16 20" shape-rendering="crispEdges">
        <rect x="2" y="2" width="12" height="16" fill="#5a1530"/><rect x="1" y="1" width="14" height="2" fill="#2d0a18"/><rect x="1" y="17" width="14" height="2" fill="#2d0a18"/>
        <rect x="5" y="7" width="2" height="2" fill="#ff5a5a"/><rect x="9" y="7" width="2" height="2" fill="#ff5a5a"/><rect x="5" y="11" width="6" height="1" fill="#ff5a5a"/>
      </svg>
      <div class="slotLabel">詛咒卷</div><div class="slotCount"><span id="cntCurse">0</span> 已用</div>
    </div>
  </div>
  <div class="btnrow">
    <button class="ghost" id="btnChannel">🔄 換頻道</button>
    <button class="ghost" id="btnAgain">再拿一件(同款)</button>
  </div>
</div>

<div class="card stats">
  <div><b id="sWhite">0</b><span>白卷消耗</span></div>
  <div><b id="sBless">0</b><span>祝福卷消耗</span></div>
  <div><b id="sDead">0</b><span>蒸發件數</span></div>
  <div><b id="sBest" class="best">+0</b><span>歷史最高</span></div>
</div>

<div class="card">
  <details open><summary>裝備選擇</summary>
    <div class="kindTabs">
      <button class="kindTab active" data-kind="w">⚔ 武器</button>
      <button class="kindTab" data-kind="a">🛡 防具</button>
    </div>
    <div class="typeChips" id="typeChips"></div>
    <div class="itemGrid" id="itemGrid"></div>
  </details>
</div>

<div class="card">
  <details><summary>衝裝記錄</summary><div id="log"></div></details>
  <details><summary>🪦 蒸發墓園</summary><div id="grave">還沒有犧牲者。</div></details>
</div>

<div class="card">
  <details><summary>⚙ 設定</summary>
    <button id="btnReport" style="width:100%">🚩 這件裝備的名字翻譯怪怪的,回報一下</button>
    <div id="reportList" style="font-size:.7rem;color:var(--sub);margin-top:8px;line-height:1.6">尚未回報任何譯名問題。</div>
  </details>
</div>

const KIND_LABEL={w:'武器',a:'防具'};
const SCROLL_LABEL={white:'白卷',bless:'祝福卷',curse:'詛咒卷'};
const W_TYPE_ORDER=['blunt','sword','tohandsword','bow','spear','staff'];
const A_TYPE_ORDER=['helm','armor','t','cloak','shield','boot','glove'];

const $=id=>document.getElementById(id);
let S=JSON.parse(localStorage.getItem('enchsimV2')||'null')||{white:0,bless:0,curse:0,dead:0,best:0,graves:{},reports:[]};
function saveS(){localStorage.setItem('enchsimV2',JSON.stringify(S));}

let it=null;      // 目前裝備 {id,n,kind,type,typeLabel,cat,safe,icon,lv}
let lastDef=null;  // 記住最近選過的裝備定義,給「再拿一件(同款)」用
let busy=false;
let pickerKind='w', pickerType=null;
let armed=null;   // 目前武裝的卷軸:'white'|'bless'|'curse'|null(天堂原版玩法=先點卷軸再點裝備)

// 過安定幾階決定顯示色階(與安定值連動,不是寫死絕對等級)
function tier(lv,safe){const over=lv-safe;if(over>=6)return 't4';if(over>=3)return 't3';if(over>=1)return 't2';return 't1';}

function metaText(){
  if(!it)return'';
  let s=KIND_LABEL[it.kind]+'・'+it.typeLabel+'・安定+'+it.safe;
  if(it.safe===0)s+='(無安全區,一開始就有風險)';
  s+=it.lv>=it.safe?'・已過安定':'・安定內必成';
  return s;
}

// 查表算「目前這階用這種卷軸」的官方總成功率(供%顯示與擲骰共用同一份資料,確保UI顯示的數字=實際擲骰用的數字)
function lookup(scrollType){
  if(!it)return null;
  const t=PROB[it.cat]&&PROB[it.cat][scrollType];
  if(!t)return null;
  return t[it.lv]||null;
}
function successRate(scrollType){
  const outs=lookup(scrollType);
  if(!outs)return null;
  return outs.filter(o=>o[0]==='ok').reduce((s,o)=>s+o[2],0);
}

function render(){
  if(!it){$('itemName').textContent='—';$('itemName').className='t1';$('itemMeta').textContent='';}
  else{$('itemName').textContent='+'+it.lv+' '+it.n;$('itemName').className=tier(it.lv,it.safe);$('itemMeta').textContent=metaText();}
  $('sWhite').textContent=S.white;$('sBless').textContent=S.bless;$('sDead').textContent=S.dead;$('sBest').textContent='+'+S.best;
  $('cntWhite').textContent=S.white;$('cntBless').textContent=S.bless;$('cntCurse').textContent=S.curse;
  $('btnAgain').disabled=!lastDef;
}
function fmtRate(rate){return rate>=99.99?'必成':(Math.round(rate*100)/100)+'%成功';}
// 武裝/取消武裝一個卷軸:武裝中會讓道具格亮起、裝備卡浮動提示可點,對應天堂原版「先點卷軸再點裝備」的施用手感
function setArmed(scrollType){
  armed=scrollType;
  document.querySelectorAll('.slot').forEach(s=>s.classList.toggle('armed',s.dataset.scroll===scrollType));
  $('itemBox').classList.toggle('targetable',!!armed);
  if(!armed){msg(it?'點一個卷軸,再點裝備施用':'選一件裝備開始','info');return;}
  if(!it){msg('先選一件裝備','info');return;}
  const rate=successRate(armed);
  const label=SCROLL_LABEL[armed];
  msg(rate===null?(label+' 對目前裝備不適用'):('已選'+label+'!點裝備來施用('+fmtRate(rate)+')'),'info');
}

function msg(t,c){const m=$('msg');m.textContent=t;m.className=c;}
function log(html,cls){const d=document.createElement('div');d.className=cls||'';d.innerHTML=html;$('log').prepend(d);}
function renderGrave(){const g=Object.entries(S.graves).map(([k,v])=>'🪦 '+k+' ×'+v).join('<br>');$('grave').innerHTML=g||'還沒有犧牲者。';}

function selectItem(def){
  it={id:def.id,n:def.n,kind:def.kind,type:def.type,typeLabel:def.typeLabel,cat:def.cat,safe:def.safe,icon:def.icon,lv:0};
  lastDef=def;
  msg('拿到了 '+it.n+'。衝吧。','info');
  log('🆕 拿到 '+it.n+'(安定+'+it.safe+', '+KIND_LABEL[it.kind]+'/'+it.typeLabel+')','born');
  document.querySelectorAll('.pickitem').forEach(el=>el.classList.toggle('sel',+el.dataset.id===def.id));
  render();
}

// ===== 核心:照官方表擲骰,三種結果 =====
// 流程=點卷軸(武裝)→點裝備(這裡)→跳官方成功率確認一拍(550ms)→開卷心跳(900ms,沿用手感草稿節奏)→結果演出
function enchant(scrollType){
  if(!it||busy)return;
  const outs=lookup(scrollType);
  if(!outs){msg(SCROLL_LABEL[scrollType]+' 對目前這階不適用','info');return;}
  busy=true;
  const rate=successRate(scrollType);
  msg('確認機率:'+SCROLL_LABEL[scrollType]+'・目前 '+fmtRate(rate)+'……','info');
  setTimeout(()=>{
    S[scrollType]++;
    render();
    const opening={white:'卷軸捲了起來……',bless:'祝福的卷軸在發光……',curse:'詛咒的低語傳來……'};
    msg(opening[scrollType],'info');
    setTimeout(()=>{
      const roll=Math.random()*100;
      let acc=0,chosen=outs[outs.length-1];
      for(const o of outs){acc+=o[2];if(roll<acc){chosen=o;break;}}
      const box=$('itemBox'),fl=$('flash');
      fl.className='';void fl.offsetWidth;
      const [type,toLv]=chosen;
      if(type==='ok'){
        const jump=toLv-it.lv;
        it.lv=toLv;
        if(it.lv>S.best)S.best=it.lv;
        if(scrollType==='curse'){
          fl.className='ok';msg(it.n+' 被詛咒侵蝕 → +'+it.lv,'ok');
          log('⚫ '+it.n+' 詛咒 → <b>+'+it.lv+'</b>','ok');
        }else if(jump>=2){
          fl.className='crit';msg('聖光爆發!! '+it.n+' 連跳'+jump+'級 → +'+it.lv,'crit');
          log('✨ '+it.n+' 連跳 → <b>+'+it.lv+'</b>','crit');
        }else{
          const over=it.lv>it.safe;
          fl.className=over?'crit':'ok';
          msg(it.n+' 發出'+(over?'耀眼金光':'藍光')+' → +'+it.lv,over?'crit':'ok');
          log((over?'🌟':'🔵')+' '+it.n+' → <b>+'+it.lv+'</b>'+(over?'(過安定!)':''),over?'crit':'ok');
        }
      }else if(type==='keep'){
        fl.className='keep';
        msg('卷軸化為粉末…… '+it.n+' 安然無恙(仍是 +'+it.lv+')','keep');
        log('💨 '+it.n+' 卷軸耗損,裝備無事(+'+it.lv+')','keep');
      }else{
        S.dead++;box.classList.add('shake');fl.className='bad';
        msg('碎裂——+'+it.lv+' '+it.n+' 蒸發了。','bad');
        log('💥 +'+it.lv+' '+it.n+' <b>蒸發</b>','bad');
        const k='+'+it.lv+' '+it.n;S.graves[k]=(S.graves[k]||0)+1;
        renderGrave();
        it=null;
        setTimeout(()=>box.classList.remove('shake'),600);
      }
      saveS();render();
      busy=false;
    },900);
  },550);
}

// 卷軸道具格:點一下=武裝(再點同一格=取消),不再是「選好裝備按按鈕」
document.querySelectorAll('.slot').forEach(s=>{
  s.onclick=()=>{if(busy)return;const st=s.dataset.scroll;setArmed(armed===st?null:st);};
});
// 武裝中點裝備卡(或選裝器裡目前選中的那張)=施用;點其他地方=取消武裝,交還原本的操作
document.addEventListener('click',(e)=>{
  if(!armed)return;
  if(e.target.closest('.slot'))return; // 交給上面 slot 自己的 onclick 處理(切換/取消)
  const isTarget=e.target.closest('#itemBox')||e.target.closest('.pickitem.sel');
  if(isTarget){e.stopPropagation();const st=armed;setArmed(null);enchant(st);return;}
  setArmed(null); // 點空白處(或別件裝備、其他按鈕)=取消施用
},true);
$('btnAgain').onclick=()=>{if(lastDef&&!busy)selectItem(lastDef);};

// 彩蛋①換頻道:純視覺,機率完全不變
$('btnChannel').onclick=()=>{
  if(busy)return;
  const box=$('itemBox');
  box.classList.add('channelFlip');
  msg('正在換頻道……手氣重新整理中','info');
  setTimeout(()=>{
    box.classList.remove('channelFlip');
    msg(it?'頻道換好了,感覺手氣變好了(其實機率沒變)':'選一件裝備開始','info');
  },700);
};

// 彩蛋②深夜加成曖昧提示:純文字,機率完全不變
(function(){
  const h=new Date().getHours();
  if(h>=0&&h<5){$('nightHint').textContent='🌙 深夜衝裝…加成?(傳說,機率沒有變,別太迷信)';$('nightHint').style.display='block';}
})();

// 譯名回報:先不擋上線,記到 localStorage 供之後匯出校對
function renderReports(){$('reportList').textContent=S.reports.length?'已回報:'+S.reports.join('、'):'尚未回報任何譯名問題。';}
$('btnReport').onclick=()=>{
  if(!it)return;
  if(!S.reports.includes(it.n)){S.reports.push(it.n);saveS();}
  renderReports();
  msg('已記錄「'+it.n+'」,謝謝回報!','info');
};

// ===== 裝備選擇器 =====
function itemCardHtml(x){
  const img=x.icon?'<img src="lineage-icons/'+x.icon+'.png" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">':'';
  const fb='<div class="ifallback" style="'+(x.icon?'display:none':'display:flex')+'">'+x.n[0]+'</div>';
  return '<div class="pickitem'+(it&&it.id===x.id?' sel':'')+'" data-id="'+x.id+'">'+img+fb+'<div class="pname">'+x.n+'</div><div class="psafe">安定+'+x.safe+'</div></div>';
}
function renderPicker(){
  const kindItems=ITEMS.filter(x=>x.kind===pickerKind);
  const order=pickerKind==='w'?W_TYPE_ORDER:A_TYPE_ORDER;
  const types=order.filter(t=>kindItems.some(x=>x.type===t));
  let chips='<button class="chip'+(pickerType===null?' active':'')+'" data-type="">全部('+kindItems.length+')</button>';
  for(const t of types){
    const inCat=kindItems.filter(x=>x.type===t);
    chips+='<button class="chip'+(pickerType===t?' active':'')+'" data-type="'+t+'">'+inCat[0].typeLabel+'('+inCat.length+')</button>';
  }
  $('typeChips').innerHTML=chips;
  const shown=pickerType?kindItems.filter(x=>x.type===pickerType):kindItems;
  $('itemGrid').innerHTML=shown.map(itemCardHtml).join('');
}
document.querySelectorAll('.kindTab').forEach(b=>b.onclick=()=>{
  pickerKind=b.dataset.kind;pickerType=null;
  document.querySelectorAll('.kindTab').forEach(x=>x.classList.toggle('active',x===b));
  renderPicker();
});
$('typeChips').addEventListener('click',e=>{
  const b=e.target.closest('.chip');if(!b)return;
  pickerType=b.dataset.type||null;
  renderPicker();
});
$('itemGrid').addEventListener('click',e=>{
  const c=e.target.closest('.pickitem');if(!c)return;
  const def=ITEMS.find(x=>x.id===+c.dataset.id);
  if(def)selectItem(def);
});

// ===== 初始化 =====
renderReports();
renderGrave();
renderPicker();
const defaultDef=ITEMS.find(x=>x.id===2); // 武士刀,平民神器,當第一次進來的預設裝備
if(defaultDef)selectItem(defaultDef);
render();
</script></body></html>
