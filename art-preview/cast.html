<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>全卡司同框總檢</title>
<style>
body{margin:0;background:#171210;color:#efe3cc;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;padding:16px}
h1{font-size:20px;color:#d9a441;text-align:center;margin:10px 0 4px}
p.sub{text-align:center;color:#b7a68a;font-size:13px;margin:0 0 16px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:640px;margin:0 auto}
@media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr)}}
.card{background:#211a16;border:1px solid #3a2e24;border-radius:8px;overflow:hidden}
.card img{width:100%;display:block;background:#000}
.card .tag{padding:6px 8px;font-size:12.5px;text-align:center}
.tag b{color:#d9a441}
.tag .old{color:#8a7a5f;font-size:11px}
.tag .new{color:#7fc97f;font-size:11px}
.note{max-width:640px;margin:16px auto;font-size:13.5px;line-height:1.7;color:#cfc0a4;background:#211a16;border:1px solid #3a2e24;border-radius:8px;padding:12px 14px}
</style></head><body>
<h1>全卡司同框總檢</h1>
<p class="sub">舊七角(0712批)+阿夏(新產線)並排|你只要回:誰看起來「不像一家人」或「不夠好」</p>
<div class="grid">
<div class="card"><img src="../godot-proto/art/portraits/laotie/laotie_mother.png"><div class="tag"><b>老鐵嘴</b> <span class="old">舊</span></div></div>
<div class="card"><img src="../godot-proto/art/portraits/xiulan/xiulan_mother.png"><div class="tag"><b>秀蘭姐</b> <span class="old">舊</span></div></div>
<div class="card"><img src="../godot-proto/art/portraits/zhanggui/zhanggui_mother.png"><div class="tag"><b>掌櫃</b> <span class="old">舊</span></div></div>
<div class="card"><img src="../godot-proto/art/portraits/acai/acai_mother.png"><div class="tag"><b>阿財</b> <span class="old">舊</span></div></div>
<div class="card"><img src="../godot-proto/art/portraits/akun/akun_mother.png"><div class="tag"><b>阿坤</b> <span class="old">舊</span></div></div>
<div class="card"><img src="../godot-proto/art/portraits/xiaobei/xiaobei_mother.png"><div class="tag"><b>水手小北</b> <span class="old">舊</span></div></div>
<div class="card"><img src="../godot-proto/art/portraits/xiaodi/xiaodi_mother.png"><div class="tag"><b>小弟</b> <span class="old">舊</span></div></div>
<div class="card"><img src="../godot-proto/art/portraits/axia/axia_mother.png"><div class="tag"><b>阿夏</b> <span class="new">新產線(眼待改)</span></div></div>
<div class="card"><img src="../godot-proto/art/portraits/qiye/qiye_mother.png"><div class="tag"><b>七爺</b> <span class="new">新・已過關</span></div></div>
<div class="card"><img src="../godot-proto/art/portraits/zhanzhang/zhanzhang_mother.png"><div class="tag"><b>站長伯</b> <span class="new">新・已過關</span></div></div>
<div class="card"><img src="../godot-proto/art/portraits/xiaobei/xiaobei_mother.png"><div class="tag"><b>小北(重製)</b> <span class="new">新・已過關</span></div></div>
</div>
<div class="note">
<b>看什麼:</b>①線條粗細像不像同一枝筆 ②膚色是不是同一家人 ③誰的質感明顯掉檔<br>
<b>CEO 立場:</b>舊角與新角同一條產線出身,原則上不重做;阿繪同步在跑專業審計(量化比對),兩邊點名重疊的才進重製隊列——施工中不亂動地基。
</div>
</body></html>
